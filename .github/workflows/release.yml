name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install libpcap
        run: brew install libpcap

      - name: Build macOS (arm64)
        run: wails build -platform darwin/arm64

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "NachoConnect" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 80 \
            --icon "nachoconnect.app" 150 185 \
            --app-drop-link 450 185 \
            --no-internet-enable \
            "NachoConnect-macOS-arm64.dmg" \
            "build/bin/nachoconnect.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: NachoConnect-macOS-arm64.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Npcap SDK
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile npcap-sdk.zip
          Expand-Archive npcap-sdk.zip -DestinationPath npcap-sdk
          echo "CGO_CFLAGS=-I${{ github.workspace }}\npcap-sdk\Include" >> $env:GITHUB_ENV
          echo "CGO_LDFLAGS=-L${{ github.workspace }}\npcap-sdk\Lib\x64" >> $env:GITHUB_ENV

      - name: Build Windows (amd64)
        run: wails build -platform windows/amd64 -nsis

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/bin/*.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            macos-dmg/NachoConnect-macOS-arm64.dmg
            windows-installer/*.exe
          draft: false
          generate_release_notes: true
