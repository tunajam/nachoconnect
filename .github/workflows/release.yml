name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install libpcap
        run: brew install libpcap

      - name: Compile l2tunnel (arm64)
        run: |
          cd lib/l2tunnel
          make l2tunnel
          file l2tunnel
          cd ../..

      - name: Build macOS (arm64)
        run: wails build -platform darwin/arm64

      - name: Bundle l2tunnel into app
        run: |
          mkdir -p build/bin/nachoconnect.app/Contents/Resources
          cp lib/l2tunnel/l2tunnel build/bin/nachoconnect.app/Contents/Resources/l2tunnel
          chmod +x build/bin/nachoconnect.app/Contents/Resources/l2tunnel

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "NachoConnect" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 80 \
            --icon "nachoconnect.app" 150 185 \
            --app-drop-link 450 185 \
            --no-internet-enable \
            "NachoConnect-macOS-arm64.dmg" \
            "build/bin/nachoconnect.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: NachoConnect-macOS-arm64.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Npcap SDK
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile npcap-sdk.zip
          Expand-Archive npcap-sdk.zip -DestinationPath npcap-sdk
          echo "CGO_CFLAGS=-I${{ github.workspace }}\npcap-sdk\Include" >> $env:GITHUB_ENV
          echo "CGO_LDFLAGS=-L${{ github.workspace }}\npcap-sdk\Lib\x64" >> $env:GITHUB_ENV

      - name: Download Npcap installer
        shell: powershell
        run: |
          # Download free Npcap installer to bundle with the app
          # Users will be prompted to install during NSIS setup if not already present
          $NpcapUrl = "https://npcap.com/dist/npcap-1.80.exe"
          $Dest = "build\bin\npcap-installer.exe"
          New-Item -ItemType Directory -Force -Path "build\bin" | Out-Null
          Invoke-WebRequest -Uri $NpcapUrl -OutFile $Dest
          Write-Host "Downloaded Npcap installer to $Dest"

      - name: Compile l2tunnel (Windows)
        shell: bash
        run: |
          cd lib/l2tunnel
          # Cross-compile for Windows using MinGW
          x86_64-w64-mingw32-gcc -o l2tunnel.exe \
            -Wall -O3 \
            -DBUILD_DATE='"$(date -u)"' \
            -DBUILD_VERSION='"$(git rev-parse --short HEAD)"' \
            -I ../../npcap-sdk/Include \
            -L ../../npcap-sdk/Lib/x64 \
            l2tunnel.c -lwpcap -lws2_32 || echo "Windows l2tunnel build skipped (no MinGW)"
          cd ../..

      - name: Build Windows (amd64)
        run: wails build -platform windows/amd64 -nsis

      - name: Bundle l2tunnel and scripts into Windows build
        shell: bash
        run: |
          if [ -f lib/l2tunnel/l2tunnel.exe ]; then
            cp lib/l2tunnel/l2tunnel.exe build/bin/l2tunnel.exe
          fi
          cp scripts/npcap-check.ps1 build/bin/npcap-check.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/bin/*.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            macos-dmg/NachoConnect-macOS-arm64.dmg
            windows-installer/*.exe
          draft: false
          generate_release_notes: true
